{% extends "base.html" %}
{% block title %}AW Client Portal — Welcome{% endblock %}

{% block body %}
<div class="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-brand-900 via-brand-800 to-brand-700 text-white px-4">
    <div class="text-center max-w-2xl">
        <div class="mb-6">
            <div class="w-20 h-20 mx-auto bg-white bg-opacity-10 rounded-2xl flex items-center justify-center mb-4">
                <svg class="w-12 h-12 text-brand-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
            </div>
        </div>
        <h1 class="text-4xl sm:text-5xl font-bold mb-4 tracking-tight">AW Client Portal</h1>
        <p class="text-lg sm:text-xl text-brand-200 mb-2">Financial Report Management System</p>
        <p class="text-brand-300 mb-10">Generate SACS &amp; TCC quarterly reports in minutes</p>
        <a href="{{ url_for('clients.client_list') }}"
           class="inline-flex items-center gap-2 bg-white text-brand-900 font-semibold px-8 py-4 rounded-xl hover:bg-brand-50 transition-all shadow-lg hover:shadow-xl text-lg">
            Enter Portal
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
            </svg>
        </a>
    </div>
    <p class="mt-16 text-brand-400 text-sm">Windbrook Solutions &mdash; EF Financial Planning</p>
</div>
{% endblock %}
